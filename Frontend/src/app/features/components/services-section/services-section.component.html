<section class="py-24 bg-white">
  <div class="container mx-auto px-4">

    <!-- Header -->
    <div class="text-center max-w-2xl mx-auto mb-16">
      <span class="text-teal-600 font-medium text-sm tracking-wider uppercase mb-4 block">
        Our Services
      </span>
      <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
        Comprehensive Healthcare Solutions
      </h2>
      <p class="text-gray-500 text-lg">
        We offer a wide range of medical services tailored to meet your unique health needs
        with compassion and expertise.
      </p>
    </div>

    <!-- Services Grid -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let service of services"
           class="group bg-white rounded-2xl p-8 border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 h-full cursor-pointer">
        <div class="w-14 h-14 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300"
             [ngClass]="service.colorClass">
          <svg class="w-7 h-7" [ngClass]="service.iconColorClass" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="service.iconPath"/>
          </svg>
        </div>
        <h3 class="font-semibold text-xl text-gray-900 mb-3">{{ service.title }}</h3>
        <p class="text-gray-500 leading-relaxed">{{ service.description }}</p>
      </div>
    </div>

    <!-- CTA -->
    <div class="text-center mt-12">
      <a routerLink="/services"
         class="inline-flex items-center gap-2 px-6 py-3 border-2 border-gray-200 rounded-xl text-gray-700 font-medium hover:border-teal-300 hover:text-teal-600 transition-all">
        View All Services
      </a>
    </div>
  </div>
</section>
