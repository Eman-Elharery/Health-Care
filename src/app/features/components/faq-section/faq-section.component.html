<section class="py-24 bg-white">
  <div class="container mx-auto px-4">
    <div class="max-w-3xl mx-auto">

      <!-- Header -->
      <div class="text-center mb-12">
        <span class="text-teal-600 font-medium text-sm tracking-wider uppercase mb-4 block">
          FAQs
        </span>
        <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
          Frequently Asked Questions
        </h2>
        <p class="text-gray-500 text-lg">
          Find answers to common questions about our services and policies.
        </p>
      </div>

      <!-- Accordion -->
      <div class="space-y-4">
        <div *ngFor="let faq of faqs; let i = index"
             class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">

          <!-- Question -->
          <button
            class="w-full flex items-center justify-between px-6 py-5 text-left hover:bg-gray-50 transition-colors"
            (click)="toggle(i)"
          >
            <span class="font-medium text-gray-900 pr-4">{{ faq.question }}</span>
            <svg
              class="w-5 h-5 text-gray-400 shrink-0 transition-transform duration-200"
              [class.rotate-180]="faq.isOpen"
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <!-- Answer -->
          <div
            class="overflow-hidden transition-all duration-300 ease-in-out"
            [class.max-h-0]="!faq.isOpen"
            [class.max-h-96]="faq.isOpen"
          >
            <p class="px-6 pb-5 text-gray-500 leading-relaxed">
              {{ faq.answer }}
            </p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
