<header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-lg border-b border-gray-100">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between h-16 md:h-20">

      <a routerLink="/" class="flex items-center gap-2">
       <img src="assets/images/MyIcon.png" 
     alt="logo"
     class="w-10 h-10 rounded-xl object-cover">
        <span class="text-xl font-semibold text-gray-900">By.Dwedar</span>
      </a>

      <nav class="hidden md:flex items-center gap-8">
        <a
          *ngFor="let link of navLinks"
          [routerLink]="link.href"
          class="text-sm font-medium transition-colors hover:text-teal-600"
          [ngClass]="isActive(link.href) ? 'text-teal-600' : 'text-gray-500'"
        >
          {{ link.label }}
        </a>
      </nav>

      <div class="hidden md:flex items-center gap-3">
        <!-- <a routerLink="/login"
           class="flex items-center gap-1 px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Login
        </a> -->
        <a routerLink="/book-appointment"
           class="flex items-center gap-1 px-4 py-2 text-sm font-medium bg-[#42759d]  text-white rounded-xl hover:opacity-90 transition-opacity shadow-md ">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Book Appointment
        </a>
      </div>

      <button class="md:hidden p-2 text-gray-700" (click)="toggleMenu()">
        <svg *ngIf="!isOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg *ngIf="isOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <div *ngIf="isOpen"
       class="md:hidden bg-white border-b border-gray-100 animate-mobile-menu">
    <nav class="container mx-auto px-4 py-4 flex flex-col gap-2">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.href"
        (click)="closeMenu()"
        class="py-3 px-4 rounded-xl text-sm font-medium transition-colors"
        [ngClass]="isActive(link.href) ? 'bg-teal-50 text-teal-600' : 'text-gray-500 hover:bg-gray-50'"
      >
        {{ link.label }}
      </a>
      <div class="flex flex-col gap-2 mt-4 pt-4 border-t border-gray-100">
        <a routerLink="/login" (click)="closeMenu()"
           class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-gray-200 text-sm font-medium text-gray-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Login
        </a>
        <a routerLink="/book-appointment" (click)="closeMenu()"
           class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-gradient-to-r from-teal-500 to-blue-600 text-white text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Book Appointment
        </a>
      </div>
    </nav>
  </div>
</header>
