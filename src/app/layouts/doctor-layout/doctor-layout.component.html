<div class="min-h-screen bg-gray-50">

  <!-- Mobile Header -->
  <header class="lg:hidden fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-100 h-16 flex items-center justify-between px-4">
    <button (click)="sidebarOpen = true" class="p-2 text-gray-600">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-teal-500 to-blue-600 flex items-center justify-center">
        <span class="text-white font-bold text-sm">M</span>
      </div>
      <span class="font-semibold text-gray-900">MediCare</span>
    </div>
    <button class="p-2 relative text-gray-600">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>
  </header>

  <!-- Sidebar Overlay -->
  <div *ngIf="sidebarOpen"
       class="lg:hidden fixed inset-0 bg-black/50 z-40"
       (click)="sidebarOpen = false">
  </div>

  <!-- Sidebar -->
  <aside
    class="fixed top-0 left-0 h-full w-72 bg-white border-r border-gray-100 z-50 transition-transform duration-300 flex flex-col"
    [class.-translate-x-full]="!sidebarOpen"
    [class.translate-x-0]="sidebarOpen"
  >
    <!-- Logo -->
    <div class="p-6 border-b border-gray-100 flex items-center justify-between">
      <a routerLink="/" class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-blue-600 flex items-center justify-center">
          <span class="text-white font-bold text-xl">M</span>
        </div>
        <span class="text-xl font-semibold text-gray-900">MediCare</span>
      </a>
      <button (click)="sidebarOpen = false" class="lg:hidden p-2 text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Doctor Badge -->
    <div class="mx-4 mt-4 p-3 bg-teal-50 rounded-xl flex items-center gap-3">
      <img
        src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=100&h=100&fit=crop"
        alt="Doctor"
        class="w-10 h-10 rounded-full object-cover"
      />
      <div>
        <p class="font-medium text-gray-900 text-sm">{{ user.firstName }} {{ user.lastName }}</p>
        <p class="text-xs text-teal-600">Administrator</p>
      </div>
    </div>

    <!-- Nav Links -->
    <nav class="p-4 space-y-1 flex-1 mt-2">
      <a
        *ngFor="let link of sidebarLinks"
        [routerLink]="link.href"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-colors"
        [ngClass]="isActive(link.href)
          ? 'bg-gradient-to-r from-teal-500 to-blue-600 text-white shadow-md shadow-teal-100'
          : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900'"
      >
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="link.iconPath"/>
        </svg>
        {{ link.label }}
      </a>
    </nav>

    <!-- Sign Out -->
    <div class="p-4 border-t border-gray-100">
      <button
        (click)="logout()"
        class="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="lg:ml-72 pt-16 lg:pt-0 min-h-screen">

    <!-- Desktop Header -->
    <header class="hidden lg:flex h-20 bg-white border-b border-gray-100 items-center justify-between px-8">
      <!-- Search -->
      <div class="flex items-center gap-4 flex-1">
        <div class="relative w-80">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            [(ngModel)]="searchQuery"
            type="text"
            placeholder="Search patients, articles..."
            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border-0 rounded-xl text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-500/20"
          />
        </div>
      </div>

      <!-- Right -->
      <div class="flex items-center gap-4">
        <button class="p-2 relative rounded-full hover:bg-gray-50 transition-colors">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <div class="flex items-center gap-3">
          <img
            src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=100&h=100&fit=crop"
            alt="Doctor"
            class="w-10 h-10 rounded-full object-cover"
          />
          <div>
            <p class="font-medium text-gray-900 text-sm">{{ user.firstName }} {{ user.lastName }}</p>
            <p class="text-xs text-gray-400">Administrator</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <router-outlet></router-outlet>
  </main>
</div>
